spring:
  application:
    name: saccoplus-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

---
# ═══════════════════════════ DEV ════════════════════════════════════
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url:               jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:saccoplus_db}
    username:          ${DB_USERNAME:postgres}
    password:          ${DB_PASSWORD:eddy123}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 10000
      maximum-pool-size:  5
  jpa:
    hibernate:
      ddl-auto: update
    show-sql:       true
    open-in-view:   false
    properties:
      hibernate:
        format_sql: true
  mail:
    host:     ${MAIL_HOST:smtp.gmail.com}
    port:     ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:therese14niyigena@gmail.com}
    password: ${MAIL_PASSWORD:rxjn lwoy lzus rcaw}
    properties:
      mail:
        smtp:
          auth:             true                     # ← fixed: proper YAML nesting
          starttls:
            enable:         true
            required:       true                     # ← add: reject non-TLS connections

server:
  port: ${SERVER_PORT:8081}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics                 # ← add: metrics useful in dev
  endpoint:
    health:
      show-details: always                           # ← full details fine in dev

app:
  jwt:
    secret:            ${JWT_SECRET:dev_secret_min_32_chars_placeholder_only}
    expiration-ms:     3600000
    refresh-expiry-ms: 604800000
  cors:
    allowed-origins:   ${CORS_ORIGINS:http://localhost:3000}
  mail:
    from: ${MAIL_FROM:noreply@saccoplus.rw}

logging:
  level:
    com.saccoplus:                DEBUG
    org.springframework.security: DEBUG              # ← DEBUG helpful in dev
    org.springframework.mail:     DEBUG              # ← add: debug mail issues
    com.zaxxer.hikari:            DEBUG              # ← add: debug DB pool issues

springdoc:
  swagger-ui:
    path:           /swagger-ui.html
    try-it-out-enabled: true                         # ← add: enable "Try it" in dev
  api-docs:
    path: /v3/api-docs

---
# ═══════════════════════════ PROD ═══════════════════════════════════
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url:      jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size:    20
      minimum-idle:         5
      connection-timeout:   30000
      idle-timeout:         600000
      max-lifetime:         1800000
      leak-detection-threshold: 60000               # ← add: detect connection leaks
  jpa:
    hibernate:
      ddl-auto: update
    show-sql:     false
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          batch_size: 25                             # ← add: batch inserts/updates
        order_inserts:  true                         # ← add: pair with batch_size
        order_updates:  true                         # ← add: pair with batch_size
  mail:
    host:     ${MAIL_HOST}
    port:     ${MAIL_PORT}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth:         true
          starttls:
            enable:   true
            required: true

server:
  port: ${SERVER_PORT:8081}
  tomcat:
    threads:
      max: 200
    connection-timeout: 5s                          # ← add: drop slow clients
  compression:
    enabled:      true                              # ← add: gzip API responses
    mime-types:   application/json,application/xml

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
  server:
    port: 9090                                      # ← add: separate actuator port

app:
  jwt:
    secret:            ${JWT_SECRET}
    expiration-ms:     3600000
    refresh-expiry-ms: 604800000
  cors:
    allowed-origins:   ${CORS_ORIGINS}
  mail:
    from: ${MAIL_FROM}

logging:
  level:
    com.saccoplus: INFO
    root:          WARN
  file:
    name: /var/log/saccoplus/app.log                # ← add: persist logs in prod
  logback:
    rollingpolicy:
      max-file-size:    50MB
      max-history:      30                          # ← add: keep 30 days of logs