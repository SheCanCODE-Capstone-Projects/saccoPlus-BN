spring:
  application:
    name: saccoplus-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

---
# ═══════════════════════════ DEV ════════════════════════════════════
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url:               jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:saccoplus_db}
    username:          ${DB_USERNAME:postgres}
    password:          ${DB_PASSWORD:changeme}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true   # dialect line removed
  mail:
    host:     ${MAIL_HOST:smtp.gmail.com}
    port:     ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth:            true
      mail.smtp.starttls.enable: true

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  jwt:
    secret:            ${JWT_SECRET:dev_secret_min_32_chars_placeholder_only}
    expiration-ms:     3600000
    refresh-expiry-ms: 604800000
  cors:
    allowed-origins:   ${CORS_ORIGINS:http://localhost:3000}
  mail:
    from: ${MAIL_FROM:noreply@saccoplus.rw}

logging:
  level:
    com.saccoplus:                DEBUG
    org.springframework.security: INFO

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

---
# ═══════════════════════════ PROD ═══════════════════════════════════
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url:      jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size:    20
      minimum-idle:         5
      connection-timeout:   30000   # ← add: fail fast if DB unreachable
      idle-timeout:         600000  # ← add: release idle connections
      max-lifetime:         1800000 # ← add: recycle connections every 30min
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false             # ← add: avoid lazy-load anti-pattern
  mail:
    host:     ${MAIL_HOST}
    port:     ${MAIL_PORT}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail.smtp.auth:            true
      mail.smtp.starttls.enable: true

server:
  port: 8080
  tomcat:
    threads:
      max: 200                      # ← add: tune for your container size

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never           # ← add: don't leak internals in prod

app:
  jwt:
    secret:            ${JWT_SECRET}
    expiration-ms:     3600000
    refresh-expiry-ms: 604800000
  cors:
    allowed-origins:   ${CORS_ORIGINS}
  mail:
    from: ${MAIL_FROM}

logging:
  level:
    com.saccoplus: INFO
    root:          WARN